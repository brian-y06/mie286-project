<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIE286 — Experiment Setup</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="setup-page">

  <div class="setup-container">
    <div class="setup-card">
      <div class="setup-header">
        <div class="icon-badge">🧪</div>
        <h1>MIE286 Experiment</h1>
        <p class="subtitle">Visual vs Auditory Cue Response Study</p>
      </div>

      <form id="setupForm" class="setup-form">
        <div class="form-group">
          <label for="participantId">Participant ID</label>
          <input
            type="text"
            id="participantId"
            placeholder="e.g. P01"
            required
            autocomplete="off"
          >
        </div>

        <div class="form-group">
          <label>Condition</label>
          <div class="radio-group">
            <label class="radio-card" id="radioVisual">
              <input type="radio" name="condition" value="visual" required>
              <div class="radio-content">
                <span class="radio-icon">👁️</span>
                <span class="radio-label">Visual</span>
                <span class="radio-desc">Word appears on screen</span>
              </div>
            </label>
            <label class="radio-card" id="radioAuditory">
              <input type="radio" name="condition" value="auditory" required>
              <div class="radio-content">
                <span class="radio-icon">🔊</span>
                <span class="radio-label">Auditory</span>
                <span class="radio-desc">Word is spoken aloud</span>
              </div>
            </label>
          </div>
        </div>

        <button type="submit" class="btn-start" id="btnStart">
          Start Experiment
          <span class="btn-arrow">→</span>
        </button>
      </form>

      <div class="setup-footer">
        <p>Ensure headphones are connected before selecting Auditory.</p>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('setupForm').addEventListener('submit', (e) => {
      e.preventDefault();
      const pid = document.getElementById('participantId').value.trim();
      const condition = document.querySelector('input[name="condition"]:checked')?.value;
      if (!pid || !condition) return;
      window.location.href = `experiment.html?pid=${encodeURIComponent(pid)}&condition=${condition}`;
    });
  </script>
</body>
</html>
